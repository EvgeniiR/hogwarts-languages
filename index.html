<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hogwarts</title>
<meta name="theme-color" content="#07091a">
<script>
// Redirect to the correct language HTML based on the deployment hostname.
(function(){
  var host = location.hostname;
  if (host.indexOf('english') !== -1) {
    location.replace('/hogwarts-english.html');
  } else {
    location.replace('/hogwarts-espanol.html');
  }
})();
</script>
</head>
<body>
<p>Redirecting…</p>
</body>
</html>
